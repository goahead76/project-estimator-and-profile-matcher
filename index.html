<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Project Estimator</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            padding: 20px;
        }

        .login-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        .header-section {
            margin-bottom: 32px;
            text-align: center;
        }

        .header-section h2 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header-section p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background-color: #0f172a;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 15px;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: var(--primary-hover);
        }

        .submit-btn:disabled {
            background-color: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        #errorMessage {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="header-section">
            <h2>Welcome Back</h2>
            <p>Project Estimator & Profile Matcher Portal</p>
        </div>

        <div id="errorMessage"></div>

        <!-- Connected fields directly to match Form fields parsed by your backend database layout -->
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" id="submitBtn" class="submit-btn">Log In</button>
        </form>
        <div style="text-align: center; margin-top: 20px; font-size: 14px; color: #94a3b8;">
    Don't have an account? <a href="/register.html" style="color: #3b82f6; text-decoration: none;">Sign Up</a>
</div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const errorDiv = document.getElementById('errorMessage');
            const submitBtn = document.getElementById('submitBtn');
            
            // UI Reset
            errorDiv.style.display = 'none';
            errorDiv.innerText = '';
            submitBtn.disabled = true;
            submitBtn.innerText = 'Verifying...';

            // Gather standard URL Encoded Form Data required by FastAPI Form(...) elements
            const formData = new FormData(e.target);            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    body: formData
                });                
                const data = await response.json();                
                if (response.ok) {
                    // Cache login success status locally before moving on
                    localStorage.setItem('isAuthenticated', 'true');
                    
                    // Redirect straight to dashboard.html returned by your main.py layout
                    window.location.href = data.redirect || '/dashboard.html'; 
                } else {
                    // Extract detailed exception tracking thrown from backend HTTPExceptions
                    errorDiv.innerText = data.detail || 'Invalid email or password combination.';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.innerText = 'Network error: Cannot reach the authentication server.';
                errorDiv.style.display = 'block';
                console.error('Auth pipeline failure:', err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Log In';
            }
        });
    </script>
</body>
</html>
